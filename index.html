<body class="bg-savituhBlack text-white min-h-screen flex flex-col justify-between selection:bg-orange-500 selection:text-white">

    <div id="root" class="min-h-screen flex flex-col justify-between max-w-md mx-auto px-4 py-4"></div>

    <script type="text/babel">
        class AudioHapticEngine {
            constructor() {
                this.ctx = null;
                this.isInitialized = false;
                this.pinkNoiseBuffer = null;
                this.currentSource = null;
                this.currentGain = null;
            }

            init() {
                if (!this.isInitialized) {
                    try {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        this.ctx = new AudioContext();
                        this.isInitialized = true;
                        this.pinkNoiseBuffer = this.createPinkNoiseBuffer();
                    } catch (e) {
                        console.warn("Web Audio API not supported", e);
                    }
                }
                if (this.ctx && this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            createPinkNoiseBuffer() {
                if (!this.ctx) return null;
                const bufferSize = this.ctx.sampleRate * 2;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const output = buffer.getChannelData(0);
                let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
                for (let i = 0; i < bufferSize; i++) {
                    const white = Math.random() * 2 - 1;
                    b0 = 0.99886 * b0 + white * 0.0555179;
                    b1 = 0.99332 * b1 + white * 0.0750759;
                    b2 = 0.96900 * b2 + white * 0.1538520;
                    b3 = 0.86650 * b3 + white * 0.3104856;
                    b4 = 0.55000 * b4 + white * 0.5329522;
                    b5 = -0.7616 * b5 - white * 0.0168980;
                    output[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                    output[i] *= 0.11;
                    b6 = white * 0.115926;
                }
                return buffer;
            }

            triggerHaptic(intensity = 'medium') {
                if (navigator.vibrate) {
                    if (intensity === 'click') navigator.vibrate(12);
                    else if (intensity === 'phase') navigator.vibrate([25, 40, 25]);
                    else navigator.vibrate(18);
                }
            }

            stopCurrentAudio() {
                if (this.currentSource) {
                    try {
                        this.currentSource.stop();
                        this.currentSource.disconnect();
                    } catch (e) {}
                    this.currentSource = null;
                }
            }

            startPhaseAudio(templateType, phase, durationSec, isDeep = false) {
                this.init();
                if (!this.ctx || phase === 'HOLD') {
                    this.stopCurrentAudio();
                    return;
                }
                this.stopCurrentAudio();

                const now = this.ctx.currentTime;
                const dur = Math.max(0.1, durationSec);

                try {
                    const bufferSource = this.ctx.createBufferSource();
                    bufferSource.buffer = this.pinkNoiseBuffer || this.createPinkNoiseBuffer();
                    bufferSource.loop = true;

                    const filter = this.ctx.createBiquadFilter();
                    const gain = this.ctx.createGain();

                    let startFreq = 250;
                    let endFreq = 800;
                    let peakVol = 0.12;

                    if (templateType === 'RECHARGE') {
                        filter.type = 'lowpass';
                        if (isDeep) {
                            if (phase === 'INHALE') { startFreq = 180; endFreq = 650; peakVol = 0.18; }
                            else if (phase === 'EXHALE') { startFreq = 650; endFreq = 180; peakVol = 0.18; }
                        } else if (phase === 'INHALE') { startFreq = 350; endFreq = 1200; peakVol = 0.22; }
                        else if (phase === 'EXHALE') { startFreq = 1200; endFreq = 350; peakVol = 0.22; }
                        else { startFreq = 180; endFreq = 200; peakVol = 0.03; }
                    } else if (templateType === 'BALANCE') {
                        filter.type = 'lowpass';
                        if (phase === 'INHALE') { startFreq = 220; endFreq = 550; peakVol = 0.12; }
                        else { startFreq = 550; endFreq = 220; peakVol = 0.12; }
                    } else if (templateType === 'RECOVERY') {
                        if (phase === 'INHALE') {
                            // Balloon Fill Simulation:
                            filter.type = 'bandpass';
                            filter.Q.setValueAtTime(2.5, now);
                            filter.Q.exponentialRampToValueAtTime(6.0, now + dur);
                            startFreq = 160; 
                            endFreq = 580; 
                            peakVol = 0.16;

                            try {
                                const tensionOsc = this.ctx.createOscillator();
                                const oscGain = this.ctx.createGain();
                                tensionOsc.type = 'sine';
                                tensionOsc.frequency.setValueAtTime(110, now);
                                tensionOsc.frequency.exponentialRampToValueAtTime(280, now + dur);
                                
                                oscGain.gain.setValueAtTime(0.001, now);
                                oscGain.gain.linearRampToValueAtTime(0.035, now + dur * 0.4);
                                oscGain.gain.linearRampToValueAtTime(0.001, now + dur);

                                tensionOsc.connect(oscGain);
                                oscGain.connect(this.ctx.destination);
                                tensionOsc.start(now);
                                tensionOsc.stop(now + dur);
                            } catch(e) {}
                        } else if (phase === 'EXHALE') {
                            // Straw Exhale Simulation:
                            filter.type = 'bandpass';
                            filter.Q.setValueAtTime(12.0, now);
                            filter.Q.linearRampToValueAtTime(8.5, now + dur);
                            
                            startFreq = 1250; 
                            endFreq = 780; 
                            peakVol = 0.14;

                            try {
                                const frictionFilter = this.ctx.createBiquadFilter();
                                const frictionGain = this.ctx.createGain();
                                frictionFilter.type = 'highpass';
                                frictionFilter.frequency.setValueAtTime(2200, now);

                                frictionGain.gain.setValueAtTime(0.001, now);
                                frictionGain.gain.linearRampToValueAtTime(0.025, now + dur * 0.2);
                                frictionGain.gain.linearRampToValueAtTime(0.001, now + dur);

                                bufferSource.connect(frictionFilter);
                                frictionFilter.connect(frictionGain);
                                frictionGain.connect(this.ctx.destination);
                            } catch(e) {}
                        }
                    }

                    filter.frequency.setValueAtTime(startFreq, now);
                    filter.frequency.exponentialRampToValueAtTime(Math.max(100, endFreq), now + dur);

                    gain.gain.setValueAtTime(0.001, now);
                    gain.gain.linearRampToValueAtTime(peakVol, now + dur * 0.35);
                    gain.gain.linearRampToValueAtTime(0.001, now + dur);

                    bufferSource.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.ctx.destination);

                    bufferSource.start(now);
                    bufferSource.stop(now + dur);

                    this.currentSource = bufferSource;
                    this.currentGain = gain;
                } catch (e) {
                    console.warn("Audio play error", e);
                }
            }
        }

        const audioEngine = new AudioHapticEngine();

        const RAINBOW_COLORS = [
            { day: 'Mon', name: 'Red', hex: '#FF3B30' },
            { day: 'Tue', name: 'Orange', hex: '#FF9500' },
            { day: 'Wed', name: 'Yellow', hex: '#FFCC00' },
            { day: 'Thu', name: 'Green', hex: '#34C759' },
            { day: 'Fri', name: 'Blue', hex: '#007AFF' },
            { day: 'Sat', name: 'Indigo', hex: '#5856D6' },
            { day: 'Sun', name: 'Violet', hex: '#AF52DE' },
        ];

        function SavituhDeviceSim({ 
            sessionState, 
            boltState, 
            boltScore, 
            completedPractices, 
            rainbowProgress, 
            onHapticClick 
        }) {
            const svgSize = 340;
            const center = svgSize / 2;
            
            const rRainbow = 150;
            const rOuter = 120;   // Exhale (Outer)
            const rMiddle = 95;   // Hold (Middle)
            const rInner = 70;    // Inhale (Inner)
            const rButton = 45;   // Central Haptic Tap

            let fillInner = 0;
            let fillMiddle = 0;
            let fillOuter = 0;

            if (completedPractices.RECHARGE) fillInner = 1;
            if (completedPractices.BALANCE) fillMiddle = 1;
            if (completedPractices.RECOVERY) fillOuter = 1;

            if (sessionState.isExecuting) {
                if (sessionState.phase === 'STILLNESS') {
                    fillInner = 1; fillMiddle = 1; fillOuter = 1;
                } else if (sessionState.phase === 'INHALE') {
                    fillInner = sessionState.phaseProgress; fillMiddle = 0; fillOuter = 0;
                } else if (sessionState.phase === 'HOLD') {
                    fillInner = 1; fillMiddle = sessionState.phaseProgress; fillOuter = 0;
                } else if (sessionState.phase === 'EXHALE') {
                    fillInner = 1; fillMiddle = sessionState.hasMiddleRing ? 1 : 0; fillOuter = sessionState.phaseProgress;
                }
            }

            let boltColor = 'rgba(226, 232, 240, 0.85)';
            if (boltState === 'COMPLETE' && boltScore) {
                if (boltScore.category === 'Poor') { fillInner = 1; boltColor = '#FF3B30'; }
                else if (boltScore.category === 'Average') { fillMiddle = 1; boltColor = '#FF9500'; }
                else if (boltScore.category === 'Good') { fillOuter = 1; boltColor = '#34C759'; }
                else if (boltScore.category === 'Elite') { fillInner = 1; fillMiddle = 1; fillOuter = 1; boltColor = '#FFCC00'; }
            }

            const createArc = (radius, progress, strokeWidth = 4.5, color = "rgba(226, 232, 240, 0.85)") => {
                const circumference = 2 * Math.PI * radius;
                const clampedProgress = Math.min(1, Math.max(0, progress));
                const strokeDashoffset = circumference * (1 - clampedProgress);
                return (
                    <circle
                        cx={center}
                        cy={center}
                        r={radius}
                        fill="none"
                        stroke={color}
                        strokeWidth={strokeWidth}
                        strokeDasharray={circumference}
                        strokeDashoffset={strokeDashoffset}
                        strokeLinecap="round"
                        transform={`rotate(-90 ${center} ${center})`}
                        className="glow-white"
                    />
                );
            };

            return (
                <div className="relative flex flex-col items-center justify-center my-2">
                    <div className="relative w-[340px] h-[340px] flex items-center justify-center">
                        <svg width={svgSize} height={svgSize} className="drop-shadow-2xl">
                            <circle cx={center} cy={center} r={165} fill="#0a0a0f" stroke="#22222f" strokeWidth="3" />

                            {RAINBOW_COLORS.map((item, index) => {
                                const segmentAngle = 360 / 7;
                                const gap = 3;
                                const startAngle = index * segmentAngle + gap / 2;
                                const endAngle = (index + 1) * segmentAngle - gap / 2;

                                const startRad = ((startAngle - 90) * Math.PI) / 180;
                                const endRad = ((endAngle - 90) * Math.PI) / 180;

                                const x1 = center + rRainbow * Math.cos(startRad);
                                const y1 = center + rRainbow * Math.sin(startRad);
                                const x2 = center + rRainbow * Math.cos(endRad);
                                const y2 = center + rRainbow * Math.sin(endRad);

                                const isLit = index < rainbowProgress;

                                return (
                                    <path
                                        key={item.day}
                                        d={`M ${x1} ${y1} A ${rRainbow} ${rRainbow} 0 0 1 ${x2} ${y2}`}
                                        fill="none"
                                        stroke={isLit ? item.hex : '#1c1c24'}
                                        strokeWidth="10"
                                        strokeLinecap="round"
                                        className={`transition-all duration-500 ${isLit ? 'glow-rainbow' : ''}`}
                                        style={{ color: item.hex }}
                                    />
                                );
                            })}

                            <circle cx={center} cy={center} r={rOuter} fill="none" stroke="#1f1f2a" strokeWidth="3.5" />
                            <circle cx={center} cy={center} r={rMiddle} fill="none" stroke="#1f1f2a" strokeWidth="3.5" />
                            <circle cx={center} cy={center} r={rInner} fill="none" stroke="#1f1f2a" strokeWidth="3.5" />

                            {createArc(rInner, fillInner, 4.5, boltState === 'COMPLETE' ? boltColor : 'rgba(226, 232, 240, 0.85)')}
                            {createArc(rMiddle, fillMiddle, 4.5, boltState === 'COMPLETE' ? boltColor : 'rgba(226, 232, 240, 0.85)')}
                            {createArc(rOuter, fillOuter, 4.5, boltState === 'COMPLETE' ? boltColor : 'rgba(226, 232, 240, 0.85)')}
                        </svg>

                        {}
                        <div className="absolute inset-0 flex items-center justify-center">
                            <button
                                onClick={onHapticClick}
                                style={{ width: `${rButton * 2}px`, height: `${rButton * 2}px` }}
                                className={`rounded-full bg-gradient-to-br from-amber-500 via-savituhOrange to-red-600 text-white flex items-center justify-center font-bold shadow-2xl transform transition-all duration-150 active:scale-95 hover:scale-105 border-2 border-orange-300/40 glow-orange cursor-pointer z-10 ${
                                    sessionState.isExecuting ? 'animate-subtle-pulse' : ''
                                }`}
                                title="Savituh Central Haptic Button"
                            >
                                <div className="w-14 h-14 rounded-full stroke-none border border-white/30 flex flex-col items-center justify-center bg-black/25 backdrop-blur-sm">
                                    {boltState === 'COUNTING' ? (
                                        <span className="font-mono text-sm font-black text-white">{boltScore ? boltScore.time : '0'}s</span>
                                    ) : sessionState.isExecuting ? (
                                        <div className="text-center">
                                            <span className="font-mono text-base font-black text-white tracking-tight">
                                                {sessionState.timeRemaining}s
                                            </span>
                                            <span className="block text-[8px] uppercase tracking-wider text-orange-200 font-bold">
                                                {sessionState.phase}
                                            </span>
                                        </div>
                                    ) : (
                                        <span className="font-sans font-black text-xs text-white tracking-widest drop-shadow">
                                            TAP
                                        </span>
                                    )}
                                </div>
                            </button>
                        </div>
                    </div>

                    <div className="mt-2 text-center">
                        <div className="text-[11px] font-bold tracking-widest text-neutral-400 uppercase flex items-center justify-center gap-1.5">
                            <span>SAVITUH HARDWARE SIMULATOR</span>
                        </div>
                        {sessionState.isExecuting && (
                            <div className="text-xs font-semibold text-orange-400 font-mono mt-0.5 animate-pulse">
                                {sessionState.phaseName} • {sessionState.timeRemaining}s left
                            </div>
                        )}
                        {boltState === 'COUNTING' && (
                            <div className="text-xs text-amber-400 font-mono mt-0.5 animate-pulse">
                                Measuring BOLT Hold... Tap Button To Stop
                            </div>
                        )}
                    </div>

                    {}
                    <div className="mt-2 bg-neutral-900/90 border border-neutral-800 rounded-xl p-2.5 text-[10px] grid grid-cols-2 gap-2 text-neutral-300">
                        <div className="flex items-center gap-2">
                            <span className="w-2.5 h-2.5 rounded-full bg-gradient-to-r from-red-500 via-green-500 to-purple-500 shrink-0 glow-rainbow"></span>
                            <div>
                                <span className="font-bold text-white block">Outer Rainbow</span>
                                <span className="text-neutral-400 text-[9px]">7-Day Habit Streak ({rainbowProgress}/7 Days)</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="w-2.5 h-2.5 rounded-full border-2 border-slate-200 shrink-0"></span>
                            <div>
                                <span className="font-bold text-white block">3 Daily Rings</span>
                                <span className="text-neutral-400 text-[9px]">Inner: Recharge • Mid: Balance • Outer: Recovery</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [activePractice, setActivePractice] = React.useState('RECHARGE');
            const [durationMinutes, setDurationMinutes] = React.useState(1);
            const [soundEnabled, setSoundEnabled] = React.useState(true);
            const [hapticEnabled, setHapticEnabled] = React.useState(true);
            const [showFeedbackModal, setShowFeedbackModal] = React.useState(false);
            const [showGuideModal, setShowGuideModal] = React.useState(false);
            const [guideTab, setGuideTab] = React.useState('rings');
            const [activeModalTab, setActiveModalTab] = React.useState('github');
            const [copySuccess, setCopySuccess] = React.useState(false);
            const [feedbackText, setFeedbackText] = React.useState('');
            const [feedbackSubmitted, setFeedbackSubmitted] = React.useState(false);

            // GitHub Integration States
            const [githubRepo, setGithubRepo] = React.useState(() => {
                try {
                    return localStorage.getItem('savituh_github_repo') || 'savituh/savituh-breathing-app';
                } catch(e) { return 'savituh/savituh-breathing-app'; }
            });
            const [githubToken, setGithubToken] = React.useState(() => {
                try { return localStorage.getItem('savituh_github_token') || ''; } catch(e) { return ''; }
            });
            const [issueType, setIssueType] = React.useState('bug');
            const [issueTitle, setIssueTitle] = React.useState('');
            const [issueBody, setIssueBody] = React.useState('');
            const [includeDiagnostics, setIncludeDiagnostics] = React.useState(true);
            const [isSubmittingGithub, setIsSubmittingGithub] = React.useState(false);
            const [githubStatus, setGithubStatus] = React.useState(null);

            const [feedbackLog, setFeedbackLog] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('savituh_feedback_log');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) {
                    return [];
                }
            });

            const [sessionState, setSessionState] = React.useState({
                isExecuting: false,
                timeRemaining: 60,
                phase: 'IDLE',
                phaseName: '',
                phaseProgress: 0,
                hasMiddleRing: false,
            });

            const [boltState, setBoltState] = React.useState('IDLE');
            const [boltScore, setBoltScore] = React.useState(null);

            const [completedPractices, setCompletedPractices] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('savituh_completed_practices');
                    return saved ? JSON.parse(saved) : { RECHARGE: false, BALANCE: false, RECOVERY: false };
                } catch(e) {
                    return { RECHARGE: false, BALANCE: false, RECOVERY: false };
                }
            });

            const [rainbowProgress, setRainbowProgress] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('savituh_rainbow_progress');
                    return saved ? parseInt(saved, 10) : 1;
                } catch(e) {
                    return 1;
                }
            });

            const [boltHistory, setBoltHistory] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('savituh_bolt_history');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) {
                    return [];
                }
            });

            React.useEffect(() => {
                try {
                    localStorage.setItem('savituh_completed_practices', JSON.stringify(completedPractices));
                    localStorage.setItem('savituh_rainbow_progress', rainbowProgress.toString());
                    localStorage.setItem('savituh_bolt_history', JSON.stringify(boltHistory));
                    localStorage.setItem('savituh_feedback_log', JSON.stringify(feedbackLog));
                    localStorage.setItem('savituh_github_repo', githubRepo);
                    localStorage.setItem('savituh_github_token', githubToken);
                } catch(e) {}
            }, [completedPractices, rainbowProgress, boltHistory, feedbackLog, githubRepo, githubToken]);

            const currentPhaseRef = React.useRef({ phaseKey: 'IDLE', practice: '' });

            React.useEffect(() => {
                let animationFrameId = null;
                let startTime = null;

                if (sessionState.isExecuting) {
                    const totalDurationSec = durationMinutes * 60;
                    startTime = performance.now();

                    const loop = (now) => {
                        const elapsedMs = now - startTime;
                        const elapsedSec = elapsedMs / 1000;
                        const remainingSec = Math.max(0, Math.ceil(totalDurationSec - elapsedSec));

                        if (elapsedSec >= totalDurationSec) {
                            audioEngine.stopCurrentAudio();
                            completeSession();
                            setSessionState({
                                isExecuting: false,
                                timeRemaining: 0,
                                phase: 'IDLE',
                                phaseName: 'Completed!',
                                phaseProgress: 1,
                                hasMiddleRing: false,
                            });
                            return;
                        }

                        let phase = 'INHALE';
                        let phaseName = 'Inhale';
                        let phaseProgress = 0;
                        let phaseDurationSec = 1.5;
                        let hasMiddleRing = false;
                        let isDeepBreath = false;

                        if (activePractice === 'RECHARGE') {
                            const minuteCycle = elapsedSec % 60.0;
                            // 3 Deep Breaths: 1.5s Inhale, 1.5s Exhale (9s total)
                            if (minuteCycle < 9.0) {
                                const subTime = minuteCycle % 3.0;
                                const breathNum = Math.floor(minuteCycle / 3.0) + 1;
                                isDeepBreath = true;
                                if (subTime < 1.5) {
                                    phase = 'INHALE';
                                    phaseName = `Deep Inhale (${breathNum}/3)`;
                                    phaseProgress = subTime / 1.5;
                                    phaseDurationSec = 1.5;
                                } else {
                                    phase = 'EXHALE';
                                    phaseName = `Deep Exhale (${breathNum}/3)`;
                                    phaseProgress = (subTime - 1.5) / 1.5;
                                    phaseDurationSec = 1.5;
                                }
                            } else if (minuteCycle < 29.0) {
                                // 20 Fast Breaths: 0.5s Inhale, 0.5s Exhale (20s total)
                                const subTime = (minuteCycle - 9.0) % 1.0;
                                const breathNum = Math.floor(minuteCycle - 9.0) + 1;
                                isDeepBreath = false;
                                if (subTime < 0.5) {
                                    phase = 'INHALE';
                                    phaseName = `Forceful Inhale (${breathNum}/20)`;
                                    phaseProgress = subTime / 0.5;
                                    phaseDurationSec = 0.5;
                                } else {
                                    phase = 'EXHALE';
                                    phaseName = `Forceful Exhale (${breathNum}/20)`;
                                    phaseProgress = (subTime - 0.5) / 0.5;
                                    phaseDurationSec = 0.5;
                                }
                            } else {
                                // Stillness
                                phase = 'STILLNESS';
                                phaseName = 'Quiet Stillness — Observe Brain & Body';
                                phaseProgress = (minuteCycle - 29.0) / 31.0;
                                phaseDurationSec = 31.0;
                            }
                        } else if (activePractice === 'BALANCE') {
                            hasMiddleRing = true;
                            const cycleTime = elapsedSec % 16.0;
                            if (cycleTime < 4.0) {
                                phase = 'INHALE';
                                phaseName = 'Inhale (4s)';
                                phaseProgress = cycleTime / 4.0;
                                phaseDurationSec = 4.0;
                            } else if (cycleTime < 8.0) {
                                phase = 'HOLD';
                                phaseName = 'Hold (4s)';
                                phaseProgress = (cycleTime - 4.0) / 4.0;
                                phaseDurationSec = 4.0;
                            } else if (cycleTime < 12.0) {
                                phase = 'EXHALE';
                                phaseName = 'Exhale (4s)';
                                phaseProgress = (cycleTime - 8.0) / 4.0;
                                phaseDurationSec = 4.0;
                            } else {
                                phase = 'HOLD';
                                phaseName = 'Hold (4s)';
                                phaseProgress = (cycleTime - 12.0) / 4.0;
                                phaseDurationSec = 4.0;
                            }
                        } else if (activePractice === 'RECOVERY') {
                            const cycleTime = elapsedSec % 12.0;
                            if (cycleTime < 4.0) {
                                phase = 'INHALE';
                                phaseName = 'Balloon Fill Inhale (4s)';
                                phaseProgress = cycleTime / 4.0;
                                phaseDurationSec = 4.0;
                            } else {
                                phase = 'EXHALE';
                                phaseName = 'Slow Straw Exhale (8s)';
                                phaseProgress = (cycleTime - 4.0) / 8.0;
                                phaseDurationSec = 8.0;
                            }
                        }

                        const phaseKey = `${phase}-${isDeepBreath ? 'DEEP' : 'REG'}`;
                        if (currentPhaseRef.current.phaseKey !== phaseKey || currentPhaseRef.current.practice !== activePractice) {
                            currentPhaseRef.current = { phaseKey, practice: activePractice };
                            if (soundEnabled) {
                                audioEngine.startPhaseAudio(activePractice, phase, phaseDurationSec, isDeepBreath);
                            } else {
                                audioEngine.stopCurrentAudio();
                            }
                            if (hapticEnabled) {

                            }
                        }

                            isExecuting: true,
                            timeRemaining: remainingSec,
                            phase,
                            phaseName,
                            phaseProgress,
                            hasMiddleRing,
                        });

                        animationFrameId = requestAnimationFrame(loop);
                    };

                                            )}
                                        </div>
                                    </div>
                                )}

                                {activeModalTab === 'share' && (
                                    <div className="space-y-3 text-xs">
                                        <div className="bg-neutral-900 border border-neutral-800 p-3.5 rounded-xl space-y-3">

                                                <i className={`fa-solid ${copySuccess ? 'fa-check' : 'fa-copy'}`}></i>

                        <div title="Complete Recharge, Balance, and Recovery to fill today's rings">
                            Daily Rings: <span className="text-white font-bold">{Object.values(completedPractices).filter(Boolean).length}/3</span> Done
                        </div>
                        <div title="Full daily completion advances your 7-day rainbow streak">
                            Weekly Streak: <span className="text-savituhOrange font-bold">{rainbowProgress}/7 Days</span>
                        </div>
                    </footer>
                </div>
            );

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
