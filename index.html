<body class="bg-savituhBlack text-white min-h-screen flex flex-col justify-between selection:bg-orange-500 selection:text-white">

    <div id="root" class="min-h-screen flex flex-col justify-between max-w-md mx-auto px-4 py-4"></div>

    <script type="text/babel">
        class AudioHapticEngine {
            constructor() {
                this.ctx = null;
                this.isInitialized = false;
                this.pinkNoiseBuffer = null;
                this.currentSource = null;
                this.currentGain = null;
            }

            init() {
                if (!this.isInitialized) {
                    try {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        this.ctx = new AudioContext();
                        this.isInitialized = true;
                        this.pinkNoiseBuffer = this.createPinkNoiseBuffer();
                    } catch (e) {
                        console.warn("Web Audio API not supported", e);
                    }
                }
                if (this.ctx && this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            createPinkNoiseBuffer() {
                if (!this.ctx) return null;
                const bufferSize = this.ctx.sampleRate * 2;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const output = buffer.getChannelData(0);
                let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
                for (let i = 0; i < bufferSize; i++) {
                    const white = Math.random() * 2 - 1;
                    b0 = 0.99886 * b0 + white * 0.0555179;
                    b1 = 0.99332 * b1 + white * 0.0750759;
                    b2 = 0.96900 * b2 + white * 0.1538520;
                    b3 = 0.86650 * b3 + white * 0.3104856;
                    b4 = 0.55000 * b4 + white * 0.5329522;
                    b5 = -0.7616 * b5 - white * 0.0168980;
                    output[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                    output[i] *= 0.11;
                    b6 = white * 0.115926;
                }
                return buffer;
            }

            triggerHaptic(intensity = 'medium') {
                if (navigator.vibrate) {
                    if (intensity === 'click') navigator.vibrate(12);
                    else if (intensity === 'phase') navigator.vibrate([25, 40, 25]);
                    else navigator.vibrate(18);
                }
            }

            stopCurrentAudio() {
                if (this.currentSource) {
                    try {
                        this.currentSource.stop();
                        this.currentSource.disconnect();
                    } catch (e) {}
                    this.currentSource = null;
                }
            }

            startPhaseAudio(templateType, phase, durationSec, isDeep = false) {
                this.init();
                if (!this.ctx || phase === 'HOLD') {
                    this.stopCurrentAudio();
                    return;
                }
                this.stopCurrentAudio();

                const now = this.ctx.currentTime;
                const dur = Math.max(0.1, durationSec);

                try {
                    const bufferSource = this.ctx.createBufferSource();
                    bufferSource.buffer = this.pinkNoiseBuffer || this.createPinkNoiseBuffer();
                    bufferSource.loop = true;

                    const filter = this.ctx.createBiquadFilter();
                    const gain = this.ctx.createGain();

                    let startFreq = 250;
                    let endFreq = 800;
                    let peakVol = 0.12;

                    if (templateType === 'RECHARGE') {
                        filter.type = 'lowpass';
                        if (isDeep) {
                            if (phase === 'INHALE') {
                                startFreq = 180;
                                endFreq = 650;
                                peakVol = 0.18;
                            } else if (phase === 'EXHALE') {
                                startFreq = 650;
                                endFreq = 180;
                                peakVol = 0.18;
                            }
                        } else if (phase === 'INHALE') {
                            startFreq = 350;
                            endFreq = 1200;
                            peakVol = 0.22;
                        } else if (phase === 'EXHALE') {
                            startFreq = 1200;
                            endFreq = 350;
                            peakVol = 0.22;
                        } else {
                            startFreq = 180;
                            endFreq = 200;
                            peakVol = 0.03;
                        }
                    } else if (templateType === 'BALANCE') {
                        filter.type = 'lowpass';
                        if (phase === 'INHALE') {
                            startFreq = 220;
                            endFreq = 550;
                            peakVol = 0.12;
                        } else {
                            startFreq = 550;
                            endFreq = 220;
                            peakVol = 0.12;
                        }
                    } else if (templateType === 'RECOVERY') {
                        if (phase === 'INHALE') {
                            filter.type = 'lowpass';
                            startFreq = 200;
                            endFreq = 480;
                            peakVol = 0.12;
                        } else {
                            filter.type = 'bandpass';
                            filter.Q.setValueAtTime(4.0, now);
                            startFreq = 650;
                            endFreq = 380;
                            peakVol = 0.10;
                        }
                    }

                    filter.frequency.setValueAtTime(startFreq, now);
                    filter.frequency.exponentialRampToValueAtTime(Math.max(100, endFreq), now + dur);

                    gain.gain.setValueAtTime(0.001, now);
                    gain.gain.linearRampToValueAtTime(peakVol, now + dur * 0.35);
                    gain.gain.linearRampToValueAtTime(0.001, now + dur);

                    bufferSource.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.ctx.destination);

                    bufferSource.start(now);
                    bufferSource.stop(now + dur);

                    this.currentSource = bufferSource;
                    this.currentGain = gain;
                } catch (e) {
                    console.warn("Audio play error", e);
                }
            }
        }

        const audioEngine = new AudioHapticEngine();

        const RAINBOW_COLORS = [
            { day: 'Mon', name: 'Red', hex: '#FF3B30' },
            { day: 'Tue', name: 'Orange', hex: '#FF9500' },
            { day: 'Wed', name: 'Yellow', hex: '#FFCC00' },
            { day: 'Thu', name: 'Green', hex: '#34C759' },
            { day: 'Fri', name: 'Blue', hex: '#007AFF' },
            { day: 'Sat', name: 'Indigo', hex: '#5856D6' },
            { day: 'Sun', name: 'Violet', hex: '#AF52DE' },
        ];

        function SavituhDeviceSim({ 
            sessionState, 
            boltState, 
            boltScore, 
            completedPractices, 
            rainbowProgress, 
            onHapticClick 
        }) {
            const svgSize = 340;
            const center = svgSize / 2;
            
            const rRainbow = 150;
            const rOuter = 120;   // Exhale (Outer)
            const rMiddle = 95;   // Hold (Middle)
            const rInner = 70;    // Inhale (Inner)
            const rButton = 45;   // Central Haptic Tap

            let fillInner = 0;
            let fillMiddle = 0;
            let fillOuter = 0;

            if (completedPractices.RECHARGE) fillInner = 1;
            if (completedPractices.BALANCE) fillMiddle = 1;
            if (completedPractices.RECOVERY) fillOuter = 1;

            if (sessionState.isExecuting) {
                if (sessionState.phase === 'STILLNESS') {
                    fillInner = 1;
                    fillMiddle = 1;
                    fillOuter = 1;
                } else if (sessionState.phase === 'INHALE') {
                    fillInner = sessionState.phaseProgress;
                    fillMiddle = 0;
                    fillOuter = 0;
                } else if (sessionState.phase === 'HOLD') {
                    fillInner = 1;
                    fillMiddle = sessionState.phaseProgress;
                    fillOuter = 0;
                } else if (sessionState.phase === 'EXHALE') {
                    fillInner = 1;
                    fillMiddle = sessionState.hasMiddleRing ? 1 : 0;
                    fillOuter = sessionState.phaseProgress;
                }
            }

            let boltColor = 'rgba(226, 232, 240, 0.85)';
            if (boltState === 'COMPLETE' && boltScore) {
                if (boltScore.category === 'Poor') { fillInner = 1; boltColor = '#FF3B30'; }
                else if (boltScore.category === 'Average') { fillMiddle = 1; boltColor = '#FF9500'; }
                else if (boltScore.category === 'Good') { fillOuter = 1; boltColor = '#34C759'; }
                else if (boltScore.category === 'Elite') { fillInner = 1; fillMiddle = 1; fillOuter = 1; boltColor = '#FFCC00'; }
            }

            const createArc = (radius, progress, strokeWidth = 4.5, color = "rgba(226, 232, 240, 0.85)") => {
                const circumference = 2 * Math.PI * radius;
                const clampedProgress = Math.min(1, Math.max(0, progress));
                const strokeDashoffset = circumference * (1 - clampedProgress);
                return (
                    <circle
                        cx={center}
                        cy={center}
                        r={radius}
                        fill="none"
                        stroke={color}
                        strokeWidth={strokeWidth}
                        strokeDasharray={circumference}
                        strokeDashoffset={strokeDashoffset}
                        strokeLinecap="round"
                        transform={`rotate(-90 ${center} ${center})`}
                        className="glow-white"
                    />
                );
            };

            return (
                <div className="relative flex flex-col items-center justify-center my-2">
                    <div className="relative w-[340px] h-[340px] flex items-center justify-center">
                        <svg width={svgSize} height={svgSize} className="drop-shadow-2xl">
                            <circle 
                                cx={center} 
                                cy={center} 
                                r={165} 
                                fill="#0a0a0f" 
                                stroke="#22222f" 
                                strokeWidth="3" 
                            />

                            {RAINBOW_COLORS.map((item, index) => {
                                const segmentAngle = 360 / 7;
                                const gap = 3;
                                const startAngle = index * segmentAngle + gap / 2;
                                const endAngle = (index + 1) * segmentAngle - gap / 2;

                                const startRad = ((startAngle - 90) * Math.PI) / 180;
                                const endRad = ((endAngle - 90) * Math.PI) / 180;

                                const x1 = center + rRainbow * Math.cos(startRad);
                                const y1 = center + rRainbow * Math.sin(startRad);
                                const x2 = center + rRainbow * Math.cos(endRad);
                                const y2 = center + rRainbow * Math.sin(endRad);

                                const isLit = index < rainbowProgress;

                                return (
                                    <path
                                        key={item.day}
                                        d={`M ${x1} ${y1} A ${rRainbow} ${rRainbow} 0 0 1 ${x2} ${y2}`}
                                        fill="none"
                                        stroke={isLit ? item.hex : '#1c1c24'}
                                        strokeWidth="10"
                                        strokeLinecap="round"
                                        className={`transition-all duration-500 ${isLit ? 'glow-rainbow' : ''}`}
                                        style={{ color: item.hex }}
                                    />
                                );
                            })}

                            <circle cx={center} cy={center} r={rOuter} fill="none" stroke="#1f1f2a" strokeWidth="3.5" />
                            <circle cx={center} cy={center} r={rMiddle} fill="none" stroke="#1f1f2a" strokeWidth="3.5" />
                            <circle cx={center} cy={center} r={rInner} fill="none" stroke="#1f1f2a" strokeWidth="3.5" />

                            {createArc(rInner, fillInner, 4.5, boltState === 'COMPLETE' ? boltColor : 'rgba(226, 232, 240, 0.85)')}
                            {createArc(rMiddle, fillMiddle, 4.5, boltState === 'COMPLETE' ? boltColor : 'rgba(226, 232, 240, 0.85)')}
                            {createArc(rOuter, fillOuter, 4.5, boltState === 'COMPLETE' ? boltColor : 'rgba(226, 232, 240, 0.85)')}
                        </svg>

                        <div className="absolute inset-0 flex items-center justify-center">
                            <button
                                onClick={onHapticClick}
                                style={{ width: `${rButton * 2}px`, height: `${rButton * 2}px` }}
                                className={`rounded-full bg-gradient-to-br from-amber-500 via-savituhOrange to-red-600 text-white flex items-center justify-center font-bold shadow-2xl transform transition-all duration-150 active:scale-95 hover:scale-105 border-2 border-orange-300/40 glow-orange cursor-pointer z-10 ${
                                    sessionState.isExecuting ? 'animate-subtle-pulse' : ''
                                }`}
                                title="Savituh Central Haptic Button"
                            >
                                <div className="w-14 h-14 rounded-full stroke-none border border-white/30 flex flex-col items-center justify-center bg-black/25 backdrop-blur-sm">
                                    {boltState === 'COUNTING' ? (
                                        <span className="font-mono text-sm font-black text-white">{boltScore ? boltScore.time : '0'}s</span>
                                    ) : sessionState.isExecuting ? (
                                        <div className="text-center">
                                            <span className="font-mono text-base font-black text-white tracking-tight">
                                                {sessionState.timeRemaining}s
                                            </span>
                                            <span className="block text-[8px] uppercase tracking-wider text-orange-200 font-bold">
                                                {sessionState.phase}
                                            </span>
                                        </div>
                                    ) : (
                                        <span className="font-sans font-black text-xs text-white tracking-widest drop-shadow">
                                            TAP
                                        </span>
                                    )}
                                </div>
                            </button>
                        </div>
                    </div>

                    <div className="mt-2 text-center">
                        <div className="text-[11px] font-bold tracking-widest text-neutral-400 uppercase flex items-center justify-center gap-1.5">
                            <span>SAVITUH HARDWARE SIMULATOR</span>
                        </div>
                        {sessionState.isExecuting && (
                            <div className="text-xs font-semibold text-orange-400 font-mono mt-0.5 animate-pulse">
                                {sessionState.phaseName} • {sessionState.timeRemaining}s left
                            </div>
                        )}
                        {boltState === 'COUNTING' && (
                            <div className="text-xs text-amber-400 font-mono mt-0.5 animate-pulse">
                                Measuring BOLT Hold... Tap Button To Stop
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            const [activePractice, setActivePractice] = React.useState('RECHARGE');
            const [durationMinutes, setDurationMinutes] = React.useState(1);
            const [soundEnabled, setSoundEnabled] = React.useState(true);
            const [hapticEnabled, setHapticEnabled] = React.useState(true);
            const [showFeedbackModal, setShowFeedbackModal] = React.useState(false);
            const [copySuccess, setCopySuccess] = React.useState(false);
            const [feedbackText, setFeedbackText] = React.useState('');
            const [feedbackSubmitted, setFeedbackSubmitted] = React.useState(false);

            const [sessionState, setSessionState] = React.useState({
                isExecuting: false,
                timeRemaining: 60,
                phase: 'IDLE',
                phaseName: '',
                phaseProgress: 0,
                hasMiddleRing: false,
            });

            const [boltState, setBoltState] = React.useState('IDLE');
            const [boltScore, setBoltScore] = React.useState(null);

            const [completedPractices, setCompletedPractices] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('savituh_completed_practices');
                    return saved ? JSON.parse(saved) : { RECHARGE: false, BALANCE: false, RECOVERY: false };
                } catch(e) {
                    return { RECHARGE: false, BALANCE: false, RECOVERY: false };
                }
            });

            const [rainbowProgress, setRainbowProgress] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('savituh_rainbow_progress');
                    return saved ? parseInt(saved, 10) : 1;
                } catch(e) {
                    return 1;
                }
            });

            const [boltHistory, setBoltHistory] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('savituh_bolt_history');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) {
                    return [];
                }
            });

            const [unlockedReward, setUnlockedReward] = React.useState(false);

            React.useEffect(() => {
                try {
                    localStorage.setItem('savituh_completed_practices', JSON.stringify(completedPractices));
                    localStorage.setItem('savituh_rainbow_progress', rainbowProgress.toString());
                    localStorage.setItem('savituh_bolt_history', JSON.stringify(boltHistory));
                } catch(e) {}
            }, [completedPractices, rainbowProgress, boltHistory]);

            const currentPhaseRef = React.useRef({ phaseKey: 'IDLE', practice: '' });

            React.useEffect(() => {
                let animationFrameId = null;
                let startTime = null;

                if (sessionState.isExecuting) {
                    const totalDurationSec = durationMinutes * 60;
                    startTime = performance.now();

                    const loop = (now) => {
                        const elapsedMs = now - startTime;
                        const elapsedSec = elapsedMs / 1000;
                        const remainingSec = Math.max(0, Math.ceil(totalDurationSec - elapsedSec));

                        if (elapsedSec >= totalDurationSec) {
                            audioEngine.stopCurrentAudio();
                            completeSession();
                            setSessionState({
                                isExecuting: false,
                                timeRemaining: 0,
                                phase: 'IDLE',
                                phaseName: 'Completed!',
                                phaseProgress: 1,
                                hasMiddleRing: false,
                            });
                            return;
                        }

                        let phase = 'INHALE';
                        let phaseName = 'Inhale';
                        let phaseProgress = 0;
                        let phaseDurationSec = 1.5;
                        let hasMiddleRing = false;
                        let isDeepBreath = false;

                        if (activePractice === 'RECHARGE') {
                            const minuteCycle = elapsedSec % 60.0;
                            if (minuteCycle < 6.0) {
                                const subTime = minuteCycle % 2.0;
                                const breathNum = Math.floor(minuteCycle / 2.0) + 1;
                                isDeepBreath = true;
                                if (subTime < 1.0) {
                                    phase = 'INHALE';
                                    phaseName = `Deep Inhale (${breathNum}/3)`;
                                    phaseProgress = subTime / 1.0;
                                    phaseDurationSec = 1.0;
                                } else {
                                    phase = 'EXHALE';
                                    phaseName = `Deep Exhale (${breathNum}/3)`;
                                    phaseProgress = (subTime - 1.0) / 1.0;
                                    phaseDurationSec = 1.0;
                                }
                            } else if (minuteCycle < 26.0) {
                                const subTime = (minuteCycle - 6.0) % 1.0;
                                const breathNum = Math.floor(minuteCycle - 6.0) + 1;
                                isDeepBreath = false;
                                if (subTime < 0.5) {
                                    phase = 'INHALE';
                                    phaseName = `Forceful Inhale (${breathNum}/20)`;
                                    phaseProgress = subTime / 0.5;
                                    phaseDurationSec = 0.5;
                                } else {
                                    phase = 'EXHALE';
                                    phaseName = `Forceful Exhale (${breathNum}/20)`;
                                    phaseProgress = (subTime - 0.5) / 0.5;
                                    phaseDurationSec = 0.5;
                                }
                            } else {
                                phase = 'STILLNESS';
                                phaseName = 'Quiet Stillness — Notice Body Changes';
                                phaseProgress = (minuteCycle - 26.0) / 34.0;
                                phaseDurationSec = 34.0;
                            }
                        } else if (activePractice === 'BALANCE') {
                            hasMiddleRing = true;
                            const cycleTime = elapsedSec % 16.0;
                            if (cycleTime < 4.0) {
                                phase = 'INHALE';
                                phaseName = 'Inhale (4s)';
                                phaseProgress = cycleTime / 4.0;
                                phaseDurationSec = 4.0;
                            } else if (cycleTime < 8.0) {
                                phase = 'HOLD';
                                phaseName = 'Hold (4s)';
                                phaseProgress = (cycleTime - 4.0) / 4.0;
                                phaseDurationSec = 4.0;
                            } else if (cycleTime < 12.0) {
                                phase = 'EXHALE';
                                phaseName = 'Exhale (4s)';
                                phaseProgress = (cycleTime - 8.0) / 4.0;
                                phaseDurationSec = 4.0;
                            } else {
                                phase = 'HOLD';
                                phaseName = 'Hold (4s)';
                                phaseProgress = (cycleTime - 12.0) / 4.0;
                                phaseDurationSec = 4.0;
                            }
                        } else if (activePractice === 'RECOVERY') {
                            const cycleTime = elapsedSec % 12.0;
                            if (cycleTime < 4.0) {
                                phase = 'INHALE';
                                phaseName = 'Deep Inhale (4s)';
                                phaseProgress = cycleTime / 4.0;
                                phaseDurationSec = 4.0;
                            } else {
                                phase = 'EXHALE';
                                phaseName = 'Slow Straw Exhale (8s)';
                                phaseProgress = (cycleTime - 4.0) / 8.0;
                                phaseDurationSec = 8.0;
                            }
                        }

                        const phaseKey = `${phase}-${isDeepBreath ? 'DEEP' : 'REG'}`;
                        if (currentPhaseRef.current.phaseKey !== phaseKey || currentPhaseRef.current.practice !== activePractice) {
                            currentPhaseRef.current = { phaseKey, practice: activePractice };
                            if (soundEnabled) {
                                audioEngine.startPhaseAudio(activePractice, phase, phaseDurationSec, isDeepBreath);
                            } else {
                                audioEngine.stopCurrentAudio();
                            }
                            if (hapticEnabled) {
                                audioEngine.triggerHaptic(isDeepBreath ? 'phase' : 'click');
                            }
                        }

                        setSessionState({
                            isExecuting: true,
                            timeRemaining: remainingSec,
                            phase,
                            phaseName,
                            phaseProgress,
                            hasMiddleRing,
                        });

                        animationFrameId = requestAnimationFrame(loop);
                    };

                    animationFrameId = requestAnimationFrame(loop);
                } else {
                    audioEngine.stopCurrentAudio();
                    currentPhaseRef.current = { phaseKey: 'IDLE', practice: '' };
                }

                return () => {
                    if (animationFrameId) cancelAnimationFrame(animationFrameId);
                };
            }, [sessionState.isExecuting, activePractice, durationMinutes, soundEnabled, hapticEnabled]);

            React.useEffect(() => {
                let boltTimer = null;
                if (boltState === 'COUNTING') {
                    boltTimer = setInterval(() => {
                        setBoltScore((prev) => ({
                            time: (prev ? prev.time : 0) + 1,
                            category: '',
                        }));
                    }, 1000);
                }
                return () => clearInterval(boltTimer);
            }, [boltState]);

            const completeSession = () => {
                setCompletedPractices((prev) => {
                    const updated = { ...prev, [activePractice]: true };
                    if (updated.RECHARGE && updated.BALANCE && updated.RECOVERY) {
                        setRainbowProgress((rainbow) => {
                            const newRainbow = Math.min(7, rainbow + 1);
                            if (newRainbow === 7) setUnlockedReward(true);
                            return newRainbow;
                        });
                    }
                    return updated;
                });
                audioEngine.triggerHaptic('phase');
            };

            const handleHapticButtonClick = () => {
                audioEngine.init();
                audioEngine.triggerHaptic('click');

                if (activePractice === 'BOLT') {
                    if (boltState === 'IDLE') {
                        setBoltState('COUNTING');
                        setBoltScore({ time: 0, category: 'Measuring...' });
                    } else if (boltState === 'COUNTING') {
                        const finalTime = boltScore ? boltScore.time : 0;
                        let cat = 'Poor';
                        if (finalTime >= 40) cat = 'Elite';
                        else if (finalTime >= 20) cat = 'Good';
                        else if (finalTime >= 10) cat = 'Average';

                        const resultObj = { time: finalTime, category: cat, date: new Date().toLocaleDateString() };
                        setBoltScore(resultObj);
                        setBoltState('COMPLETE');
                        setBoltHistory((prev) => [resultObj, ...prev.slice(0, 9)]);
                    } else {
                        setBoltState('IDLE');
                        setBoltScore(null);
                    }
                    return;
                }

                if (sessionState.isExecuting) {
                    audioEngine.stopCurrentAudio();
                    setSessionState({
                        isExecuting: false,
                        timeRemaining: durationMinutes * 60,
                        phase: 'IDLE',
                        phaseName: '',
                        phaseProgress: 0,
                        hasMiddleRing: false,
                    });
                } else {
                    setSessionState({
                        isExecuting: true,
                        timeRemaining: durationMinutes * 60,
                        phase: 'INHALE',
                        phaseName: 'Inhale',
                        phaseProgress: 0,
                        hasMiddleRing: false,
                    });
                }
            };

            const handleCopyLink = () => {
                const url = window.location.href;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(url);
                } else {
                    const dummy = document.createElement("input");
                    document.body.appendChild(dummy);
                    dummy.value = url;
                    dummy.select();
                    document.execCommand("copy");
                    document.body.removeChild(dummy);
                }
                setCopySuccess(true);
                setTimeout(() => setCopySuccess(false), 2500);
            };

            const handleResetData = () => {
                localStorage.clear();
                setCompletedPractices({ RECHARGE: false, BALANCE: false, RECOVERY: false });
                setRainbowProgress(1);
                setBoltHistory([]);
                setBoltState('IDLE');
                setBoltScore(null);
                audioEngine.triggerHaptic('phase');
            };

            return (
                <div className="flex flex-col flex-1 justify-between gap-3">
                    {/* Header */}
                    <header className="flex items-center justify-between py-2 border-b border-neutral-900 px-1">
                        <div className="flex items-center gap-2">
                            <div className="w-2.5 h-2.5 rounded-full bg-savituhOrange animate-pulse"></div>
                            <h1 className="font-extrabold text-base tracking-widest text-white">SAVITUH</h1>
                            <span className="text-[9px] bg-savituhOrange/20 text-savituhOrange border border-savituhOrange/30 px-1.5 py-0.5 rounded font-mono">
                                TEST BUILD
                            </span>
                        </div>
                        <div className="flex items-center gap-2">
                            <button
                                onClick={() => setShowFeedbackModal(true)}
                                className="text-xs bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 text-neutral-200 px-2.5 py-1 rounded-lg flex items-center gap-1.5 transition-all"
                                title="Tester Tools & Feedback"
                            >
                                <i className="fa-solid fa-flask text-savituhOrange"></i>
                                <span className="font-semibold text-[11px]">Testing Tools</span>
                            </button>
                        </div>
                    </header>

                    {/* Hardware Simulation Interface */}
                    <main className="flex flex-col items-center justify-center flex-1 my-1">
                        <SavituhDeviceSim
                            sessionState={sessionState}
                            boltState={boltState}
                            boltScore={boltScore}
                            completedPractices={completedPractices}
                            rainbowProgress={rainbowProgress}
                            onHapticClick={handleHapticButtonClick}
                        />
                    </main>

                    {/* Controls & Mode Selection */}
                    <div className="space-y-3 bg-savituhCard/90 border border-neutral-800 p-3.5 rounded-2xl backdrop-blur-md">
                        <div className="grid grid-cols-4 gap-1.5 p-1 bg-black/50 rounded-xl border border-neutral-800">
                            {[
                                { id: 'RECHARGE', label: 'Recharge', icon: 'fa-bolt', ring: 'Inner' },
                                { id: 'BALANCE', label: 'Balance', icon: 'fa-scale-balanced', ring: 'Middle' },
                                { id: 'RECOVERY', label: 'Recovery', icon: 'fa-moon', ring: 'Outer' },
                                { id: 'BOLT', label: 'BOLT Test', icon: 'fa-heart-pulse', ring: 'O2' },
                            ].map((p) => (
                                <button
                                    key={p.id}
                                    onClick={() => {
                                        setActivePractice(p.id);
                                        setSessionState({
                                            isExecuting: false,
                                            timeRemaining: durationMinutes * 60,
                                            phase: 'IDLE',
                                            phaseName: '',
                                            phaseProgress: 0,
                                        });
                                        if (p.id !== 'BOLT') setBoltState('IDLE');
                                        audioEngine.triggerHaptic('click');
                                    }}
                                    className={`flex flex-col items-center justify-center py-2 px-1 rounded-lg transition-all ${
                                        activePractice === p.id
                                            ? 'bg-savituhOrange text-white font-bold shadow-md'
                                            : 'text-neutral-400 hover:text-white hover:bg-neutral-800/50'
                                    }`}
                                >
                                    <i className={`fa-solid ${p.icon} text-xs mb-1`}></i>
                                    <span className="text-[10px] uppercase font-bold tracking-tight">{p.label}</span>
                                </button>
                            ))}
                        </div>

                        {/* Mode Description */}
                        <div className="flex items-center justify-center gap-1.5 py-1.5 px-3 rounded-xl bg-orange-500/10 border border-orange-500/20 text-orange-200 text-xs font-medium text-center">
                            <i className="fa-solid fa-sparkles text-[10px] text-savituhOrange"></i>
                            <span>
                                {activePractice === 'RECHARGE' && 'Clears mental fog and sharpens focus'}
                                {activePractice === 'BALANCE' && 'Nervous system equilibrium & presence'}
                                {activePractice === 'RECOVERY' && 'Induce deep rest & downshift heart rate'}
                                {activePractice === 'BOLT' && 'Measures CO₂ tolerance & functional oxygenation'}
                            </span>
                        </div>

                        {/* BOLT Test Instructions */}
                        {activePractice === 'BOLT' && (
                            <div className="p-3 bg-neutral-900/90 border border-orange-500/30 rounded-xl space-y-2.5 text-xs">
                                <div className="flex items-center justify-between border-b border-neutral-800 pb-1.5">
                                    <span className="font-bold text-orange-400 uppercase tracking-wider text-[11px] flex items-center gap-1.5">
                                        <i className="fa-solid fa-circle-info text-savituhOrange"></i>
                                        How to Take the BOLT Test
                                    </span>
                                    <span className="text-[9px] font-mono bg-orange-500/10 text-orange-300 px-1.5 py-0.5 rounded border border-orange-500/20">
                                        Oxygen Advantage
                                    </span>
                                </div>

                                <ol className="space-y-1 text-neutral-300 text-[11px] list-decimal list-inside leading-snug">
                                    <li>Sit comfortably. Take a normal breath in and out.</li>
                                    <li>At the bottom of the exhale, tap the <strong>ORANGE TAP BUTTON</strong>.</li>
                                    <li>Hold breath until you feel the <strong>first distinct urge to breathe</strong>, then tap again.</li>
                                </ol>

                                <div className="pt-1 border-t border-neutral-800/80">
                                    <div className="text-[10px] font-bold text-neutral-400 uppercase tracking-wider mb-1">
                                        BOLT Score Range
                                    </div>
                                    <div className="grid grid-cols-4 gap-1 text-[9px] text-center font-mono">
                                        <div className="p-1 bg-red-950/40 border border-red-500/30 rounded">
                                            <div className="text-red-400 font-bold">&lt; 10s</div>
                                            <div className="text-neutral-400 text-[8px]">Poor</div>
                                        </div>
                                        <div className="p-1 bg-amber-950/40 border border-amber-500/30 rounded">
                                            <div className="text-amber-400 font-bold">10-20s</div>
                                            <div className="text-neutral-400 text-[8px]">Average</div>
                                        </div>
                                        <div className="p-1 bg-emerald-950/40 border border-emerald-500/30 rounded">
                                            <div className="text-emerald-400 font-bold">20-40s</div>
                                            <div className="text-neutral-400 text-[8px]">Good</div>
                                        </div>
                                        <div className="p-1 bg-yellow-950/40 border border-yellow-500/30 rounded">
                                            <div className="text-yellow-400 font-bold">&gt; 40s</div>
                                            <div className="text-neutral-400 text-[8px]">Elite</div>
                                        </div>
                                    </div>
                                </div>

                                {boltHistory.length > 0 && (
                                    <div className="pt-1 border-t border-neutral-800">
                                        <span className="text-[10px] text-neutral-400 font-bold uppercase tracking-wider block mb-1">
                                            Saved Test History:
                                        </span>
                                        <div className="flex gap-2 overflow-x-auto pb-1 font-mono text-[10px]">
                                            {boltHistory.map((h, i) => (
                                                <div key={i} className="px-2 py-1 bg-black/60 border border-neutral-800 rounded shrink-0">
                                                    <span className="text-savituhOrange font-bold">{h.time}s</span>
                                                    <span className="text-neutral-500 ml-1">({h.category})</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Duration Selector & Controls */}
                        <div className="flex items-center justify-between text-xs px-1 pt-1">
                            {activePractice !== 'BOLT' ? (
                                <div className="flex items-center gap-2">
                                    <span className="text-neutral-400 text-[11px] font-medium">Timer:</span>
                                    <div className="flex items-center gap-1 bg-black/40 px-2 py-1 rounded-lg border border-neutral-800">
                                        {[1, 3, 5, 7].map((m) => (
                                            <button
                                                key={m}
                                                onClick={() => {
                                                    setDurationMinutes(m);
                                                    setSessionState((prev) => ({
                                                        ...prev,
                                                        timeRemaining: m * 60,
                                                    }));
                                                }}
                                                className={`px-1.5 py-0.5 rounded text-[11px] font-mono font-bold transition-all ${
                                                    durationMinutes === m
                                                        ? 'bg-savituhOrange text-white'
                                                        : 'text-neutral-400 hover:text-white'
                                                }`}
                                            >
                                                {m}m
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="text-[11px] text-neutral-400 font-mono">
                                    {boltScore ? (
                                        <span>
                                            Result: <strong className="text-orange-400">{boltScore.time}s ({boltScore.category})</strong>
                                        </span>
                                    ) : (
                                        <span>Hold breath & tap central button</span>
                                    )}
                                </div>
                            )}

                            {/* Sound & Haptic Controls */}
                            <div className="flex items-center gap-2">
                                <button
                                    onClick={() => setSoundEnabled(!soundEnabled)}
                                    className={`p-1.5 rounded-lg border transition-all ${
                                        soundEnabled
                                            ? 'bg-orange-500/20 text-savituhOrange border-orange-500/40'
                                            : 'bg-neutral-900 text-neutral-500 border-neutral-800'
                                    }`}
                                    title="Toggle Sound Synthesis"
                                >
                                    <i className={`fa-solid ${soundEnabled ? 'fa-volume-high' : 'fa-volume-xmark'} text-xs`}></i>
                                </button>
                                <button
                                    onClick={() => setHapticEnabled(!hapticEnabled)}
                                    className={`p-1.5 rounded-lg border transition-all ${
                                        hapticEnabled
                                            ? 'bg-orange-500/20 text-savituhOrange border-orange-500/40'
                                            : 'bg-neutral-900 text-neutral-500 border-neutral-800'
                                    }`}
                                    title="Toggle Silent Closed-Eye Haptics"
                                >
                                    <i className="fa-solid fa-mobile-retro text-xs"></i>
                                </button>
                            </div>
                        </div>

                        {/* Unlocked Reward */}
                        {unlockedReward && (
                            <div className="p-2.5 rounded-xl bg-gradient-to-r from-amber-500/20 via-orange-500/20 to-purple-500/20 border border-amber-500/40 text-center animate-bounce">
                                <div className="text-xs font-bold text-amber-300">🎉 Weekly Rewards Unlocked!</div>
                                <div className="text-[10px] text-neutral-300 mt-0.5">
                                    Free Boba Tea Voucher & Savituh Gear Discount Claimed.
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Feedback Modal */}
                    {showFeedbackModal && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-savituhCard border border-neutral-700 rounded-2xl p-5 max-w-sm w-full space-y-4 shadow-2xl relative">
                                <button
                                    onClick={() => setShowFeedbackModal(false)}
                                    className="absolute top-4 right-4 text-neutral-400 hover:text-white"
                                >
                                    <i className="fa-solid fa-xmark text-base"></i>
                                </button>

                                <div className="flex items-center gap-2">
                                    <i className="fa-solid fa-vial-circle-check text-savituhOrange text-lg"></i>
                                    <h3 className="font-bold text-base text-white">Tester & Public Share Tools</h3>
                                </div>

                                <div className="space-y-3 text-xs">
                                    <div className="bg-neutral-900 border border-neutral-800 p-3 rounded-xl space-y-2">
                                        <span className="font-bold text-neutral-300 block">1. Share App Link</span>
                                        <p className="text-neutral-400 text-[11px]">
                                            Copy this web link to share with test users via WhatsApp, iMessage, Slack, or social media:
                                        </p>
                                        <button
                                            onClick={handleCopyLink}
                                            className="w-full py-2 px-3 bg-savituhOrange hover:bg-orange-600 font-bold text-white rounded-lg flex items-center justify-center gap-2 transition-all shadow-md"
                                        >
                                            <i className={`fa-solid ${copySuccess ? 'fa-check' : 'fa-copy'}`}></i>
                                            {copySuccess ? 'Link Copied to Clipboard!' : 'Copy Shareable App Link'}
                                        </button>
                                    </div>

                                    <div className="bg-neutral-900 border border-neutral-800 p-3 rounded-xl space-y-2">
                                        <span className="font-bold text-neutral-300 block">2. Tester Feedback Notes</span>
                                        {feedbackSubmitted ? (
                                            <div className="p-2.5 bg-emerald-950/40 border border-emerald-500/40 text-emerald-300 rounded-lg text-center font-medium text-[11px]">
                                                <i className="fa-solid fa-circle-check mr-1"></i> Thank you! Feedback logged locally.
                                            </div>
                                        ) : (
                                            <>
                                                <textarea
                                                    value={feedbackText}
                                                    onChange={(e) => setFeedbackText(e.target.value)}
                                                    placeholder="How does the haptic breathing rhythm feel? Share any bugs or suggestions..."
                                                    className="w-full h-20 bg-black/60 border border-neutral-700 rounded-lg p-2 text-white text-[11px] focus:outline-none focus:border-savituhOrange"
                                                />
                                                <button
                                                    onClick={() => {
                                                        if (feedbackText.trim()) {
                                                            setFeedbackSubmitted(true);
                                                            setTimeout(() => {
                                                                setFeedbackSubmitted(false);
                                                                setFeedbackText('');
                                                            }, 3000);
                                                        }
                                                    }}
                                                    className="w-full py-1.5 bg-neutral-800 hover:bg-neutral-700 font-semibold text-neutral-200 rounded-lg text-[11px] transition-all"
                                                >
                                                    Submit Feedback
                                                </button>
                                            </>
                                        )}
                                    </div>

                                    <div className="flex items-center justify-between pt-1">
                                        <span className="text-neutral-400 text-[11px]">Reset stored test data:</span>
                                        <button
                                            onClick={handleResetData}
                                            className="px-2.5 py-1 bg-red-950/40 hover:bg-red-900/60 border border-red-800/60 text-red-300 rounded-lg text-[10px] font-mono transition-all"
                                        >
                                            Clear LocalStorage
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <footer className="flex items-center justify-between text-[10px] text-neutral-500 pt-1 border-t border-neutral-900 px-1 font-mono">
                        <div>Daily Rings: {Object.values(completedPractices).filter(Boolean).length}/3</div>
                        <div>Rainbow Segment: {rainbowProgress}/7</div>
                    </footer>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
