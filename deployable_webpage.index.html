<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Crucial viewport meta for responsive mobile rendering and disabling unwanted zoom -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Breathe - Minimalist Haptic Guide</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and Babel CDN for zero-setup in-browser compiling -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js" crossorigin></script>
</head>
<body class="bg-black text-white selection:bg-orange-500 selection:text-black">

  <div id="root"></div>

  <!-- React code starts here -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Utility Functions for SVG Drawing ---
    const polarToCartesian = (centerX, centerY, radius, angleInDegrees) => {
      const angleInRadians = (angleInDegrees - 90) * (Math.PI / 180.0);
      return {
        x: centerX + radius * Math.cos(angleInRadians),
        y: centerY + radius * Math.sin(angleInRadians)
      };
    };

    const describeArc = (x, y, radius, startAngle, endAngle) => {
      const start = polarToCartesian(x, y, radius, endAngle);
      const end = polarToCartesian(x, y, radius, startAngle);
      const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
      return [
        "M", start.x, start.y,
        "A", radius, radius, 0, largeArcFlag, 0, end.x, end.y
      ].join(" ");
    };

    function App() {
      // App States: 'idle', 'menu', 'practicing', 'bolt_ready', 'bolt_active', 'bolt_result', 'reward'
      const [appState, setAppState] = useState('idle');
      
      // Progress States
      const [dailyProgress, setDailyProgress] = useState({ recharge: false, balance: false, recovery: false });
      const [rainbowSegments, setRainbowSegments] = useState(0);
      
      // Practice States
      const [activePractice, setActivePractice] = useState(null);
      const [timeLeft, setTimeLeft] = useState(60);
      const [currentPhase, setCurrentPhase] = useState('idle'); // 'inhale', 'hold', 'exhale', 'stillness'
      const [phaseProgress, setPhaseProgress] = useState(0); 
      const [rechargeSubtitle, setRechargeSubtitle] = useState(''); // Shows Kapalbhati details
      
      // BOLT States
      const [boltStartTime, setBoltStartTime] = useState(null);
      const [boltScore, setBoltScore] = useState(0);
      const [boltCategory, setBoltCategory] = useState(null); 

      const [stepIndex, setStepIndex] = useState(0);
      const [hapticRipple, setHapticRipple] = useState(null); 
      const [isPressingButton, setIsPressingButton] = useState(false);

      const audioCtxRef = useRef(null);
      const noiseBufferRef = useRef(null);
      const activeSoundNodesRef = useRef([]);

      // Sequences for Balance and Recovery
      const sequences = {
        balance: [
          { phase: 'inhale', duration: 4, ring: 'inner' },
          { phase: 'hold', duration: 4, ring: 'middle' },
          { phase: 'exhale', duration: 4, ring: 'outer' },
          { phase: 'hold', duration: 4, ring: 'middle' }
        ],
        recovery: [
          { phase: 'inhale', duration: 4, ring: 'inner' },
          { phase: 'exhale', duration: 8, ring: 'outer' }
        ]
      };

      const getAudioContext = () => {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return null;
        if (!audioCtxRef.current) {
          audioCtxRef.current = new AudioContext();
        }
        if (audioCtxRef.current.state === 'suspended') {
          audioCtxRef.current.resume();
        }
        return audioCtxRef.current;
      };

      const getNoiseBuffer = (ctx) => {
        if (noiseBufferRef.current) return noiseBufferRef.current;
        const bufferSize = ctx.sampleRate * 8;
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        let lastOut = 0.0;
        
        for (let i = 0; i < bufferSize; i++) {
          const white = Math.random() * 2 - 1;
          data[i] = (lastOut + (0.02 * white)) / 1.02;
          lastOut = data[i];
          data[i] *= 3.5; // Gain multiplier
        }
        noiseBufferRef.current = buffer;
        return buffer;
      };

      const stopActiveHaptics = () => {
        activeSoundNodesRef.current.forEach(node => {
          try {
            node.stop();
          } catch (e) {}
        });
        activeSoundNodesRef.current = [];
      };

      // Organic, whisper-quiet Human Breathing Synthesizer
      const playOrganicBreath = (type, durationMs = 1000) => {
        const ctx = getAudioContext();
        if (!ctx) return;

        const now = ctx.currentTime;
        stopActiveHaptics();

        const durationSec = durationMs / 1000;

        const source = ctx.createBufferSource();
        source.buffer = getNoiseBuffer(ctx);
        source.loop = true;

        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.Q.setValueAtTime(0.5, now); // Flat Q factor to eliminate whistle spikes

        const gainNode = ctx.createGain();

        source.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(ctx.destination);

        if (type === 'inhale') {
          // Subtle human inhalation sweep
          filter.frequency.setValueAtTime(150, now);
          filter.frequency.exponentialRampToValueAtTime(320, now + durationSec);

          gainNode.gain.setValueAtTime(0.001, now);
          gainNode.gain.linearRampToValueAtTime(0.24, now + (durationSec * 0.45));
          gainNode.gain.setValueAtTime(0.24, now + durationSec - 0.15);
          gainNode.gain.exponentialRampToValueAtTime(0.001, now + durationSec);

          source.start(now);
          source.stop(now + durationSec);
          activeSoundNodesRef.current.push(source);

          if (navigator.vibrate) {
            const pulses = [];
            for (let t = 0; t < durationMs; t += 250) {
              pulses.push(20);
              pulses.push(230);
            }
            navigator.vibrate(pulses);
          }

        } else if (type === 'exhale') {
          // Gentle warm breathing out sigh
          filter.frequency.setValueAtTime(300, now);
          filter.frequency.exponentialRampToValueAtTime(110, now + durationSec);

          gainNode.gain.setValueAtTime(0.001, now);
          gainNode.gain.linearRampToValueAtTime(0.28, now + 0.2);
          gainNode.gain.exponentialRampToValueAtTime(0.001, now + durationSec);

          source.start(now);
          source.stop(now + durationSec);
          activeSoundNodesRef.current.push(source);

          if (navigator.vibrate) {
            navigator.vibrate([durationMs * 0.4]);
          }
        }
      };

      const endPractice = (practice) => {
        setCurrentPhase('idle');
        setPhaseProgress(0);
        setHapticRipple(null);
        setRechargeSubtitle('');
        stopActiveHaptics();
        setDailyProgress(prev => {
          const next = { ...prev, [practice]: true };
          if (next.recharge && next.balance && next.recovery) {
            setRainbowSegments(prevRainbow => {
              const nextRainbow = prevRainbow + 1;
              if (nextRainbow >= 7) {
                setAppState('reward');
                return 7;
              }
              setAppState('idle');
              return nextRainbow;
            });
            return { recharge: false, balance: false, recovery: false };
          }
          setAppState('idle');
          return next;
        });
      };

      const startPractice = (practiceKey) => {
        const ctx = getAudioContext(); 
        if (ctx) getNoiseBuffer(ctx); 
        
        setActivePractice(practiceKey);
        setStepIndex(0);
        setPhaseProgress(0);
        
        if (practiceKey === 'recharge') {
          setTimeLeft(74); // 3 deep breaths (24s) + 20 Kapalbhati rounds (20s) + 30s stillness = 74s
        } else {
          setTimeLeft(60);
        }
        setAppState('practicing');
      };

      // Active sequence controller
      useEffect(() => {
        let animationFrame;
        let phaseStartTime = Date.now();
        let currentStepDuration = 0;

        if (appState === 'practicing' && activePractice) {
          if (activePractice === 'recharge') {
            let kapalbhatiSteps = [];
            // Stage 1: 3 Deep Breaths (Inhale 4s / Exhale 4s)
            for (let i = 0; i < 3; i++) {
              kapalbhatiSteps.push({ phase: 'inhale', duration: 4.0, ring: 'inner', text: 'Deep Breath In' });
              kapalbhatiSteps.push({ phase: 'exhale', duration: 4.0, ring: 'outer', text: 'Deep Breath Out' });
            }
            // Stage 2: 20 Kapalbhati Rounds (Exhale 0.5s / Inhale 0.5s)
            for (let i = 1; i <= 20; i++) {
              kapalbhatiSteps.push({ phase: 'exhale', duration: 0.5, ring: 'outer', text: `Forceful Exhale ${i}/20` });
              kapalbhatiSteps.push({ phase: 'inhale', duration: 0.5, ring: 'inner', text: 'Passive Inhale' });
            }
            // Stage 3: Stillness (30s)
            kapalbhatiSteps.push({ phase: 'stillness', duration: 30.0, ring: 'middle', text: 'Sit in stillness & observe' });

            if (stepIndex >= kapalbhatiSteps.length) {
              endPractice('recharge');
              return;
            }

            const currentStep = kapalbhatiSteps[stepIndex];
            currentStepDuration = currentStep.duration * 1000;
            setCurrentPhase(currentStep.phase);
            setRechargeSubtitle(currentStep.text);

            if (currentStep.phase === 'inhale') {
              setHapticRipple('sharp');
              playOrganicBreath('inhale', currentStepDuration);
            } else if (currentStep.phase === 'exhale') {
              setHapticRipple('smooth');
              playOrganicBreath('exhale', currentStepDuration);
            } else {
              setHapticRipple(null);
              stopActiveHaptics();
            }

          } else {
            const seq = sequences[activePractice];
            const currentStep = seq[stepIndex];
            currentStepDuration = currentStep.duration * 1000;
            setCurrentPhase(currentStep.phase);
            setRechargeSubtitle('');

            if (currentStep.phase === 'inhale') {
              setHapticRipple('sharp');
              playOrganicBreath('inhale', currentStepDuration);
            } else if (currentStep.phase === 'exhale') {
              setHapticRipple('smooth');
              playOrganicBreath('exhale', currentStepDuration);
            } else {
              setHapticRipple(null);
              stopActiveHaptics();
            }
          }

          const updateProgress = () => {
            const elapsed = Date.now() - phaseStartTime;
            const ratio = Math.min(elapsed / currentStepDuration, 1.0);
            setPhaseProgress(ratio);

            if (ratio >= 1.0) {
              setStepIndex((prev) => prev + 1);
            } else {
              animationFrame = requestAnimationFrame(updateProgress);
            }
          };

          animationFrame = requestAnimationFrame(updateProgress);
        } else {
          setHapticRipple(null);
          stopActiveHaptics();
        }

        return () => {
          cancelAnimationFrame(animationFrame);
          stopActiveHaptics();
        };
      }, [appState, activePractice, stepIndex]);

      // Timer update
      useEffect(() => {
        let interval;
        if (appState === 'practicing') {
          interval = setInterval(() => {
            setTimeLeft((prev) => {
              if (prev <= 1) {
                endPractice(activePractice);
                return 0;
              }
              return prev - 1;
            });
          }, 1000);
        }
        return () => clearInterval(interval);
      }, [appState, activePractice]);

      const handleCenterTap = () => {
        getAudioContext(); 
        if (appState === 'idle') setAppState('menu');
        else if (appState === 'menu') setAppState('idle');
        else if (appState === 'practicing') {
          setAppState('idle');
          setCurrentPhase('idle');
          setPhaseProgress(0);
          setHapticRipple(null);
          setRechargeSubtitle('');
          stopActiveHaptics();
        } else if (appState === 'bolt_ready') {
          setBoltStartTime(Date.now());
          setAppState('bolt_active');
        } else if (appState === 'bolt_active') {
          const score = Math.floor((Date.now() - boltStartTime) / 1000);
          setBoltScore(score);
          if (score < 10) setBoltCategory({ color: '#ef4444', text: 'Poor', ring: 'inner' });
          else if (score < 20) setBoltCategory({ color: '#f97316', text: 'Average', ring: 'middle' });
          else if (score <= 40) setBoltCategory({ color: '#22c55e', text: 'Good', ring: 'outer' });
          else setBoltCategory({ color: '#eab308', text: 'Elite', ring: 'all' });
          setAppState('bolt_result');
          setTimeout(() => setAppState('idle'), 5000);
        } else if (appState === 'reward') {
          setRainbowSegments(0);
          setDailyProgress({ recharge: false, balance: false, recovery: false });
          setAppState('idle');
        }
      };

      const getCenterText = () => {
        switch (appState) {
          case 'idle': return 'TAP';
          case 'menu': return 'BACK';
          case 'practicing': return timeLeft;
          case 'bolt_ready': return 'START';
          case 'bolt_active': return 'STOP';
          case 'bolt_result': return `${boltScore}s`;
          case 'reward': return 'CLAIM';
          default: return '';
        }
      };

      const rainbowColors = [
        '#FF0000', // Red (Monday)
        '#FF7F00', // Orange (Tuesday)
        '#FFFF00', // Yellow (Wednesday)
        '#00FF00', // Green (Thursday)
        '#0000FF', // Blue (Friday)
        '#4B0082', // Indigo (Saturday)
        '#9400D3'  // Violet (Sunday)
      ];

      const getCircleStrokeProps = (radius, isActive, dailyKey) => {
        const circumference = 2 * Math.PI * radius;
        
        if (appState !== 'practicing') {
          const isComplete = dailyProgress[dailyKey] || (appState === 'bolt_result' && (boltCategory?.ring === 'all' || boltCategory?.ring === getRingNameByRadius(radius)));
          return {
            strokeDasharray: `${circumference}`,
            strokeDashoffset: isComplete ? 0 : circumference,
            opacity: isComplete ? 1 : 0.08
          };
        }

        if (isActive) {
          return {
            strokeDasharray: `${circumference}`,
            strokeDashoffset: circumference - (circumference * phaseProgress),
            opacity: 1
          };
        }

        return {
          strokeDasharray: `${circumference}`,
          strokeDashoffset: circumference,
          opacity: 0.08
        };
      };

      const getRingNameByRadius = (radius) => {
        if (radius === 36) return 'inner';
        if (radius === 54) return 'middle';
        return 'outer';
      };

      return (
        <div className="min-h-screen bg-black flex flex-col items-center justify-center font-sans overflow-hidden select-none">
          
          {/* Status Display Header */}
          <div className="absolute top-12 text-center w-full px-6 transition-opacity duration-300">
            <h1 className="text-2xl font-bold text-orange-500 tracking-wider uppercase mb-1">
              {appState === 'practicing' ? activePractice : 
               appState === 'bolt_ready' ? 'BOLT Score' :
               appState === 'bolt_active' ? 'Hold Breath' :
               appState === 'reward' ? 'Hardware Unlocked' :
               'Breathe'}
            </h1>
            <p className="text-sm font-medium text-gray-500 h-8">
              {appState === 'idle' && `${rainbowSegments}/7 Weekly Goal`}
              {appState === 'practicing' && (rechargeSubtitle || currentPhase.toUpperCase())}
              {appState === 'bolt_result' && boltCategory?.text}
              {appState === 'reward' && "You earned an exclusive reward!"}
            </p>
          </div>

          {/* Main Ring Console */}
          <div className="relative flex items-center justify-center w-80 h-80">
            
            <svg viewBox="0 0 200 200" className="absolute inset-0 w-full h-full rotate-[-90deg]">
              {/* Rainbow Ring segments */}
              {Array.from({ length: 7 }).map((_, i) => {
                const startAngle = i * (360 / 7) + 2;
                const endAngle = (i + 1) * (360 / 7) - 2;
                const isActive = i < rainbowSegments || appState === 'reward';
                
                return (
                  <path
                    key={`rainbow-${i}`}
                    d={describeArc(100, 100, 90, startAngle, endAngle)}
                    fill="none"
                    stroke={isActive ? rainbowColors[i] : '#171717'}
                    strokeWidth="6"
                    strokeLinecap="round"
                    className="transition-all duration-700 ease-in-out"
                    style={{ 
                      filter: (isActive && appState === 'reward') ? `drop-shadow(0 0 8px ${rainbowColors[i]})` : 'none',
                      animation: appState === 'reward' ? `pulse 1.5s infinite ${i * 0.1}s` : 'none'
                    }}
                  />
                );
              })}

              {/* 2. Outer Ring (Exhale / Recovery) */}
              <circle 
                cx="100" cy="100" r="72" 
                fill="none" 
                stroke="#ffffff" 
                strokeWidth="8"
                strokeLinecap="round"
                style={{
                  ...getCircleStrokeProps(72, currentPhase === 'exhale', 'recovery'),
                  transition: appState === 'practicing' ? 'none' : 'stroke-dashoffset 0.6s ease, opacity 0.6s ease'
                }}
              />
              <circle cx="100" cy="100" r="72" fill="none" stroke="#ffffff" strokeWidth="8" className="opacity-[0.03]" />

              {/* 3. Middle Ring (Hold / Balance) */}
              <circle 
                cx="100" cy="100" r="54" 
                fill="none" 
                stroke="#ffffff" 
                strokeWidth="8"
                strokeLinecap="round"
                style={{
                  ...getCircleStrokeProps(54, currentPhase === 'hold' || currentPhase === 'stillness', 'balance'),
                  transition: appState === 'practicing' ? 'none' : 'stroke-dashoffset 0.6s ease, opacity 0.6s ease'
                }}
              />
              <circle cx="100" cy="100" r="54" fill="none" stroke="#ffffff" strokeWidth="8" className="opacity-[0.03]" />

              {/* 4. Inner Ring (Inhale / Recharge) */}
              <circle 
                cx="100" cy="100" r="36" 
                fill="none" 
                stroke="#ffffff" 
                strokeWidth="8"
                strokeLinecap="round"
                style={{
                  ...getCircleStrokeProps(36, currentPhase === 'inhale', 'recharge'),
                  transition: appState === 'practicing' ? 'none' : 'stroke-dashoffset 0.6s ease, opacity 0.6s ease'
                }}
              />
              <circle cx="100" cy="100" r="36" fill="none" stroke="#ffffff" strokeWidth="8" className="opacity-[0.03]" />
            </svg>

            {/* Central Controller Orange Button */}
            <button
              onClick={handleCenterTap}
              onTouchStart={() => setIsPressingButton(true)}
              onTouchEnd={() => setIsPressingButton(false)}
              onMouseDown={() => setIsPressingButton(true)}
              onMouseUp={() => setIsPressingButton(false)}
              className="relative z-10 w-24 h-24 rounded-full bg-orange-500 text-black font-bold text-lg tracking-widest border-4 border-black select-none outline-none transition-transform duration-100 active:scale-95 flex items-center justify-center"
              style={{
                boxShadow: isPressingButton 
                  ? '0 0 50px #f97316, inset 0 0 15px rgba(0,0,0,0.3)' 
                  : hapticRipple === 'sharp' 
                    ? '0 0 45px #f97316' 
                    : hapticRipple === 'smooth' 
                      ? '0 0 25px rgba(249,115,22,0.8)' 
                      : '0 0 30px rgba(249,115,22,0.3)'
              }}
            >
              {hapticRipple === 'sharp' && (
                <span className="absolute inset-0 rounded-full border-4 border-orange-400 animate-ping opacity-75" />
              )}
              {hapticRipple === 'smooth' && (
                <span className="absolute inset-[-15px] rounded-full border border-orange-500/35 animate-pulse" />
              )}
              <span className="relative z-10">{getCenterText()}</span>
            </button>

            {/* Program selection overlay */}
            {appState === 'menu' && (
              <div className="absolute inset-0 z-20 flex flex-col items-center justify-around py-4 bg-black/90 backdrop-blur-md rounded-full scale-105 border border-white/10 shadow-2xl animate-in fade-in zoom-in-95 duration-200">
                <button onClick={() => startPractice('recharge')} className="text-white font-bold tracking-widest hover:text-orange-500 transition-colors text-xs">RECHARGE (KAPALBHATI)</button>
                <button onClick={() => startPractice('balance')} className="text-white font-bold tracking-widest hover:text-orange-500 transition-colors text-xs">BALANCE (BOX)</button>
                <button onClick={() => startPractice('recovery')} className="text-white font-bold tracking-widest hover:text-orange-500 transition-colors text-xs">RECOVERY (REST)</button>
                <button onClick={() => setAppState('bolt_ready')} className="text-gray-500 font-bold tracking-widest text-xs border-t border-white/10 pt-2 w-1/2 text-center hover:text-white">BOLT TEST</button>
                <button onClick={handleCenterTap} className="absolute inset-0 m-auto w-16 h-16 rounded-full bg-white text-black text-xs font-bold flex items-center justify-center active:scale-95 transition-transform shadow-lg">CLOSE</button>
              </div>
            )}
          </div>

          {/* Reward Screen Banner */}
          {appState === 'reward' && (
            <div className="absolute bottom-16 animate-bounce text-center">
              <div className="bg-white text-black px-6 py-3 rounded-full font-black shadow-[0_0_20px_rgba(255,255,255,0.3)] tracking-tight">
                🎁 BOBA & GEAR UNLOCKED
              </div>
            </div>
          )}
        </div>
      );
    }

    // Mount core react component to virtual container
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
